<style>

  .pill{font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px;
    background:rgba(255,255,255,.16); color:#fff}
  .langtoggle{display:inline-flex; background:rgba(255,255,255,.16); border-radius:999px; padding:3px; margin-top:4px}
  .langtoggle button{
    border:0; background:transparent; color:#fff; font:inherit; font-size:13px; font-weight:700;
    padding:6px 14px; border-radius:999px; cursor:pointer; opacity:.85;
  }
  .langtoggle button.active{background:#fff; color:var(--accent); opacity:1}
  .toprow{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap}
  .countbar{display:flex; gap:18px; flex-wrap:wrap; margin:18px 2px 4px; color:var(--muted); font-size:13px}
  .countbar b{color:var(--ink)}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; margin-top:14px}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px 18px 10px; box-shadow:var(--shadow); display:flex; flex-direction:column;
  }
  .card h2{margin:0; font-size:18px; line-height:1.25}
  .card .seller-meta{color:var(--muted); font-size:13px; margin:3px 0 0}
  .tags{display:flex; flex-wrap:wrap; gap:6px; margin:10px 0 2px}
  .tag{font-size:11px; font-weight:700; letter-spacing:.02em; padding:3px 9px; border-radius:999px;
    background:var(--green-soft); color:var(--accent)}
  .tag.veg{background:#eaf3ea;color:#2f6d44}
  .tag.mango{background:#fbeede;color:#b9742a}
  .tag.value{background:#efe9f3;color:#6a4b86}
  .tag.grain{background:#f3eddd;color:#8a6d2a}
  .order{font-size:12.5px; color:var(--muted); margin:8px 0 4px; padding:8px 10px;
    background:#faf8f1; border:1px dashed var(--line); border-radius:10px}
  ul.items{list-style:none; margin:10px 0 6px; padding:0}
  ul.items li{display:flex; justify-content:space-between; gap:12px; align-items:baseline;
    padding:7px 0; border-bottom:1px solid var(--line)}
  ul.items li:last-child{border-bottom:0}
  .it-name{font-size:14px}
  .it-name .note{display:block; color:var(--muted); font-size:12px; margin-top:1px}
  .it-price{font-size:13.5px; font-weight:700; white-space:nowrap; color:var(--ink)}
  .subhead{font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
    color:var(--muted); margin:12px 0 2px}
  details.more summary{cursor:pointer; color:var(--accent); font-weight:600; font-size:13px;
    padding:8px 0 12px; list-style:none}
  details.more summary::-webkit-details-marker{display:none}
  details.more summary::after{content:" ▾"}
  details.more[open] summary::after{content:" ▴"}
  .formbtn{display:inline-flex; align-items:center; gap:6px; align-self:flex-start; margin:2px 0 8px;
    padding:7px 12px; background:var(--accent); color:#fff; text-decoration:none; border-radius:9px;
    font-size:13px; font-weight:700}
  .formbtn:hover{background:#27583a}
  .empty{grid-column:1/-1; text-align:center; color:var(--muted); padding:48px 16px; font-size:15px;
    background:var(--card); border:1px dashed var(--line); border-radius:16px}
  footer.page{margin-top:26px; color:var(--muted); font-size:12.5px; text-align:center; line-height:1.6}
  footer.page .note{max-width:64ch; margin:8px auto 0}
  @media (max-width:520px){
    header.page h1{font-size:21px}
    .grid{grid-template-columns:1fr}
  }
</style>
</head>

let lang = "en";

const L = () => lang==="mr" ? 1 : 0;

function ulHTML(items){
  return `<ul class="items">`+items.map(it=>{
    const note = it[4+L()] ? `<span class="note">${it[4+L()]}</span>` : "";
    return `<li><span class="it-name">${it[L()]}${note}</span><span class="it-price">${it[2+L()]}</span></li>`;
  }).join("")+`</ul>`;
}
function bodyHTML(groups){
  const PREVIEW = 6;
  let count = 0, inPost = false;
  const pre = [], post = [];
  groups.forEach(g=>{
    const head = g.head ? `<div class="subhead">${g.head[L()]}</div>` : null;
    const pi = [], qi = [];
    g.items.forEach(it=>{
      if(!inPost && count >= PREVIEW) inPost = true;
      if(inPost){ qi.push(it); } else { pi.push(it); count++; }
    });
    if(pi.length){ if(head) pre.push(head); pre.push(ulHTML(pi)); }
    if(qi.length){ if(head) post.push(head); post.push(ulHTML(qi)); }
  });
  if(post.length){
    const total = groups.reduce((a,g)=>a+g.items.length,0);
    return pre.join("") +
      `<details class="more"><summary>${UI[lang].showAll(total)}</summary>${post.join("")}</details>`;
  }
  return pre.join("");
}
function cardHTML(s){
  const tags = s.tags.map(t=>`<span class="tag ${t[2]}">${t[L()]}</span>`).join("");
  return `<section class="card">
    <h2>${s.name[L()]}</h2>
    <p class="seller-meta">${s.by[L()]}</p>
    <div class="tags">${tags}</div>
    <div class="order">${s.order[L()]}</div>
    ${s.form ? `<a class="formbtn" href="${s.form}" target="_blank" rel="noopener noreferrer">${UI[lang].formBtn} ↗</a>` : ""}
    ${bodyHTML(s.groups)}
  </section>`;
}

function render(){
  const u = UI[lang];
  document.documentElement.lang = lang;
  document.getElementById("h1").textContent = u.h1;
  document.getElementById("date").textContent = u.date;
  document.getElementById("sub").textContent = u.sub;
  document.getElementById("legend").innerHTML = u.legend.map(p=>`<span class="pill">${p}</span>`).join("");
  document.getElementById("countbar").innerHTML =
    `<span><b>${sellers.length}</b> ${u.sellersWord}</span><span><b>${u.cats}</b></span>`;
  const _grid=document.getElementById("grid");
  _grid.innerHTML = sellers.length ? sellers.map(cardHTML).join("") : `<div class="empty">${u.empty}</div>`;
  document.getElementById("foot-src").textContent = u.footSrc;
  document.getElementById("foot-note").textContent = u.footNote;
  document.getElementById("updated").textContent = u.updated + BUILD_STAMP[lang];
  document.getElementById("btn-en").classList.toggle("active", lang==="en");
  document.getElementById("btn-mr").classList.toggle("active", lang==="mr");
}
function setLang(l){
  lang = l;
  try{ localStorage.setItem("hfb-lang", l); }catch(e){}
  render();
}
document.getElementById("btn-en").addEventListener("click",()=>setLang("en"));
document.getElementById("btn-mr").addEventListener("click",()=>setLang("mr"));
